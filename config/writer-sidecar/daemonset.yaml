apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: writer-sidecar
  labels:
    app.kubernetes.io/name: writer-sidecar
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: writer-sidecar
  template:
    metadata:
      labels:
        app.kubernetes.io/name: writer-sidecar
    spec:
      serviceAccountName: writer-sidecar
      nodeSelector:
        snaplane.molpako.github.io/backup-target: "true"
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/hostname
                operator: Exists
      tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
      - key: node-role.kubernetes.io/master
        operator: Exists
        effect: NoSchedule
      containers:
      - name: writer-sidecar
        image: controller:latest
        imagePullPolicy: IfNotPresent
        securityContext:
          runAsUser: 0
        command:
        - /writer-sidecar
        args:
        - --listen-address=:9443
        - --backup-root=/var/backup
        - --heartbeat-interval=30s
        - --lease-namespace=$(POD_NAMESPACE)
        - --node-name=$(NODE_NAME)
        - --pod-ip=$(POD_IP)
        - --tls-cert-file=/certs/server/tls.crt
        - --tls-key-file=/certs/server/tls.key
        - --client-ca-file=/certs/ca/tls.crt
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        volumeMounts:
        - name: backup-root
          mountPath: /var/backup
        - name: writer-sidecar-server-cert
          mountPath: /certs/server
          readOnly: true
        - name: writer-ca
          mountPath: /certs/ca
          readOnly: true
      volumes:
      - name: backup-root
        hostPath:
          path: /var/backup
          type: DirectoryOrCreate
      - name: writer-sidecar-server-cert
        secret:
          secretName: writer-sidecar-server-cert
      - name: writer-ca
        secret:
          secretName: writer-ca
