apiVersion: apps/v1
kind: Deployment
metadata:
  name: restore-populator
  labels:
    app.kubernetes.io/name: restore-populator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: restore-populator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: restore-populator
    spec:
      serviceAccountName: restore-populator
      containers:
      - name: restore-populator
        image: controller:latest
        imagePullPolicy: IfNotPresent
        command:
        - /restore-populator
        args:
        - --mode=controller
        - --namespace=$(POD_NAMESPACE)
        - --worker-image=controller:latest
        - --worker-image-pull-policy=IfNotPresent
        - --backup-root=/var/backup
        - --target-device=/dev/restore-target
        - --http-endpoint=:8080
        env:
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        securityContext:
          runAsNonRoot: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - "ALL"
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            cpu: 500m
            memory: 128Mi
