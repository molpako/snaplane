apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

images:
- name: controller
  newName: ghcr.io/molpako/snaplane
  newTag: v0.0.1

resources:
- service_account.yaml
- role.yaml
- role_binding.yaml
- deployment.yaml
- volumepopulator.yaml

replacements:
- source:
    fieldPath: spec.template.spec.containers.0.image
    kind: Deployment
    name: restore-populator
  targets:
  - fieldPaths:
    - spec.template.spec.containers.0.args.2
    options:
      delimiter: =
      index: 1
    select:
      kind: Deployment
      name: restore-populator
