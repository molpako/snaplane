name: E2E Nightly

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e-nightly:
    name: E2E Nightly
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Kind
        uses: helm/kind-action@v1.12.0
        with:
          install_only: true

      - name: Run Nightly E2E
        run: make test-e2e-nightly
